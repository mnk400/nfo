# nfo Configuration File
# ======================

# ASCII Art Selection
# Available options: nfo, key, file, name
# (any *.txt file in the art/ directory can be used by its filename)
ART='nfo'

# Color Theme
# Available options: Magenta, Red, Blue, Cyan, Yellow, Green
TINT='Red'

# Host Display Options
# Use toilet for fancy host display (requires toilet command)
toilet_host='False'

# Text Styling
# Enable bold text for labels
ascii_bold='True'

# Output Configuration
# Define what information to display and in what order
print_out() {
    nfo art
    nfo host
    nfo colors
    nfo os
    nfo kernel
    nfo resolution
    nfo up_time
    nfo current_shell
    nfo totalpackages
    nfo total_memory
    nfo cpu
    nfo disk
    nfo terminal
    nfo local_ip
    nfo battery
}
