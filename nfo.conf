# nfo configuration
# =================

# Art piece to display (resolves to art/<ART>.txt).
ART='nfo'

# Accent color. Options: Red, Green, Yellow, Blue, Magenta, Cyan.
TINT='Blue'

# Color preview row at the bottom. Options: small, medium, square, none.
DOTS='small'

# Show the user@host header above the info column.
SHOW_HOST='True'

# Info rows to display, in order.
# Available: os, krn, up, sh, pkg, mem, cpu, dsk, bat, res, term, ip
INFO_ROWS=(
    os
    krn
    up
    sh
    pkg
    mem
    cpu
    dsk
    bat
    # res
    # term
    # ip
)
